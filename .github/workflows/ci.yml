name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea3d8b0ff00ca8d87722 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050bcc030a828d9f4eb2664ce1c # v4.1.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run build --if-present
      - run: npm test --if-present

  publish:
    if: github.event_name == 'release'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea3d8b0ff00ca8d87722
      - uses: actions/setup-node@39370e3970a6d050bcc030a828d9f4eb2664ce1c
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build --if-present
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
